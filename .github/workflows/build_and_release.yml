name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            git

      - name: Build
        shell: msys2 {0}
        run: |
          g++ -std=c++17 main.cpp -Iinclude -o weekly-random-recipe.exe

      - name: Package Release
        shell: msys2 {0}
        run: |
          mkdir release
          cp weekly-random-recipe.exe release/
          cp recipes.json.example release/
          cp README.md release/
          cp LICENSE release/

      - name: Create Zip
        shell: pwsh
        run: |
          Compress-Archive -Path release/* -DestinationPath weekly-random-recipe-${{ github.ref_name }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            weekly-random-recipe-${{ github.ref_name }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false