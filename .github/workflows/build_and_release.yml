name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential zip

      - name: Build
        run: |
          g++ -std=c++17 main.cpp -Iinclude -o weekly-random-recipe.exe

      - name: Package Release
        run: |
          mkdir -p release
          cp weekly-random-recipe.exe release/
          cp recipes.json.example release/
          cp README.md release/
          cp LICENSE release/

      - name: Create Zip
        run: |
          cd release
          zip -r ../weekly-random-recipe-${{ github.ref_name }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: weekly-random-recipe-${{ github.ref_name }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}