name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build_and_release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Build
        shell: msys2 {0}
        run: |
          g++ -std=c++17 -static -static-libgcc -static-libstdc++ main.cpp -Iinclude -o weekly-random-recipe.exe

      - name: Package Release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item weekly-random-recipe.exe, README.md, LICENSE, recipes.json.example -Destination release

      - name: Create Zip
        shell: pwsh
        run: |
          Compress-Archive -Path release\* -DestinationPath weekly-random-recipe-${{ github.ref_name }}.zip -Force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: weekly-random-recipe-${{ github.ref_name }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}